name: EAS Preview Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: ios
        type: choice
        options:
          - ios
          - android
          - all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - run: npm run typecheck
      - run: eas build --profile preview --platform ${{ inputs.platform }} --non-interactive
